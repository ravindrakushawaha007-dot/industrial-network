<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      .dark-blue { fill: #0b2a45; }
      .light-blue { fill: #4fb3ff; }
      .orange { fill: #ff7a00; }
      .white { fill: #ffffff; }
      
      /* Typography Styles */
      .st-main { font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 48px; fill: #ffffff; text-transform: uppercase; letter-spacing: 1px; }
      .st-tagline { font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 400; font-size: 18px; fill: #4fb3ff; letter-spacing: 0.5px; }
    </style>
  </defs>

  <g transform="translate(30, 20)">
    <circle cx="60" cy="60" r="58" stroke="#4fb3ff" stroke-width="4" fill="none" opacity="0.6"/>
    
    <circle cx="60" cy="2" r="4" class="orange"/> <circle cx="118" cy="60" r="4" class="orange"/> <circle cx="60" cy="118" r="4" class="orange"/> <circle cx="2" cy="60" r="4" class="orange"/> <circle cx="100" cy="20" r="3" class="light-blue"/> <circle cx="20" cy="100" r="3" class="light-blue"/> <circle cx="100" cy="100" r="3" class="light-blue"/> <circle cx="20" cy="20" r="3" class="light-blue"/> <circle cx="60" cy="60" r="40" stroke="#ff7a00" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="8 4"/>

    <path d="M40,35 V85 M80,35 V85 M40,60 H80" stroke="#ffffff" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>

  <g transform="translate(170, 75)">
