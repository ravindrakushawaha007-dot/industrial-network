<main class="admin-layout flex min-h-screen">
    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block">
        <h2 class="text-xl font-bold mb-10 text-blue-400">HW Admin</h2>
        <nav class="space-y-4">
            <a href="#" class="block p-3 bg-blue-600 rounded-lg">Overview</a>
            <a href="#users" class="block p-3 hover:bg-slate-800 rounded-lg">User Management</a>
            <a href="#posts" class="block p-3 hover:bg-slate-800 rounded-lg">Moderation</a>
            <a href="#skills" class="block p-3 hover:bg-slate-800 rounded-lg">Skill Categories</a>
            <a href="#reports" class="block p-3 hover:bg-slate-800 rounded-lg">Reports <span class="bg-red-500 text-xs px-2 py-1 rounded-full ml-2">5</span></a>
        </nav>
    </aside>

    <section class="flex-1 p-8 bg-gray-50">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="card bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">Total Users</p>
                <h3 class="text-2xl font-bold">12,840</h3>
            </div>
            <div class="card bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-gray-500 text-sm">Active Projects</p>
                <h3 class="text-2xl font-bold">450</h3>
            </div>
            <div class="card bg-white p-6 rounded-xl shadow-sm border-l-4 border-orange-500">
                <p class="text-gray-500 text-sm">Reports Pending</p>
                <h3 class="text-2xl font-bold text-red-600">5</h3>
            </div>
            <div class="card bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500">
                <p class="text-gray-500 text-sm">New Skills</p>
                <h3 class="text-2xl font-bold">28</h3>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="font-bold text-lg">User Management</h3>
                <input type="text" placeholder="Search user..." class="border p-2 rounded-lg text-sm">
            </div>
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-gray-500 text-sm">
                    <tr>
                        <th class="p-4">User</th>
                        <th class="p-4">Skill</th>
                        <th class="p-4">Status</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y text-sm">
                    <tr>
                        <td class="p-4 flex items-center gap-3">
                            <div class="w-8 h-8 bg-blue-100 rounded-full"></div>
                            <span>Amit Kumar</span>
                        </td>
                        <td class="p-4 text-gray-600">Civil Engineering</td>
                        <td class="p-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">Active</span></td>
                        <td class="p-4 text-right">
                            <button onclick="AdminModule.banUser(101)" class="text-red-500 font-medium hover:underline">Ban</button>
                            <button class="ml-4 text-blue-500 font-medium hover:underline">Edit</button>
                        </td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </section>
</main>
