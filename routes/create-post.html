<div class="upload-container border-2 border-dashed border-gray-300 dark:border-slate-700 p-6 rounded-xl text-center">
    <input type="file" id="media-input" accept="image/*,video/*,.pdf" class="hidden">
    <label for="media-input" class="cursor-pointer">
        <div id="preview-container" class="mb-4 hidden">
            </div>
        <div id="upload-prompt">
            <span class="text-blue-600 font-bold">Click to upload media</span>
            <p class="text-xs text-gray-500">Images, MP4, or PDF (Max 25MB)</p>
        </div>
    </label>
</div>
