<main class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-2xl font-bold mb-8">Share a New Skill/Project</h1>
    <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-sm space-y-6">
        <div>
            <label class="block text-sm font-medium mb-2">Skill Category</label>
            <select class="w-full p-3 rounded-lg border dark:bg-slate-900 dark:border-slate-700">
                <option>Web Development</option>
                <option>Engineering Solutions</option>
                <option>UI Design</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium mb-2">Content</label>
            <textarea placeholder="What did you build today?" rows="6" class="w-full p-3 rounded-lg border dark:bg-slate-900 dark:border-slate-700"></textarea>
        </div>
        <div class="border-2 border-dashed border-gray-300 dark:border-slate-700 p-10 text-center rounded-lg">
            <p class="text-gray-500">Drag & Drop media or <span class="text-blue-600 cursor-pointer">Browse</span></p>
        </div>
        <button class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Publish Post</button>
    </div>
</main>
